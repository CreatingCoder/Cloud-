<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --bg-color: #0d0202; /* Midnight Black */
            --card-bg: #1a0505; /* Deep Blood Red-Black */
            --text-color: #e0d0d0; /* Muted Ash White */
            --primary-color: #990000; /* Crimson Red */
            --accent-color: #da1a1a; /* Bright Blood */
            --correct-color: #1a3a1e; /* Dark Venom Green */

            --border-radius: 12px;
        }

            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            color: var(--text-color);
            line-height: 1.5;

            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {

            width: 100%;

        .header {

            align-items: center;
            border-bottom: 2px solid #3a0808;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .progress, .score-tracker {
            font-size: 0.85rem;
            font-weight: 700;
            color: #8a7373;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(218, 26, 26, 0.2);
        }

        .options-list {

            padding: 0;
            margin: 0;
        }

        .option-item {
            background-color: #240a0a;
            border: 2px solid #3d1414;
            border-radius: var(--border-radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        .option-item.eliminated {
            text-decoration: line-through;
            text-decoration-color: var(--accent-color);
            text-decoration-thickness: 2px;
            opacity: 0.35;
            border-color: #220000;
        }

        @media (hover: hover) {
            .option-item:hover:not(.disabled) {
                border-color: var(--accent-color);
                background-color: #310d0d;
                box-shadow: 0 0 8px rgba(218, 26, 26, 0.2);
            }
        }

        .option-item.correct {
            background-color: var(--correct-color) !important;
            border-color: #2ecc71 !important;
            color: var(--correct-text) !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            text-decoration: none !important;
            opacity: 1 !important;
        }

        .option-item.incorrect {
            background-color: var(--incorrect-color) !important;
            border-color: var(--accent-color) !important;
            color: var(--incorrect-text) !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            text-decoration: none !important;
            opacity: 1 !important;
        }

        .option-item.disabled {
            pointer-events: none;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            border: 1px solid #660000;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .action-btn:active {
            background-color: var(--accent-color);
        }

        .results-screen {
            text-align: center;
            display: none;
            padding: 20px 10px;
        }

        .results-screen h2 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.6rem;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .final-score {

            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(218, 26, 26, 0.6);
        }

        @media (min-width: 576px) {

            .quiz-container { padding: 30px; }
            .question { font-size: 1.2rem; }
            .option-item { font-size: 1rem; padding: 16px 20px; }
        }
    </style>
</head>

function shuffleQuizData() {
    quizData = originalQuizData.map(item => ({
        q: item.q,
        a: [...item.a],
        c: item.c
    }));

    // Fisher-Yates shuffle algorithm for the questions array
    for (let i = quizData.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
    }

    // Shuffle options inside each question securely
    quizData.forEach(item => {
        const correctAnswerText = item.a[item.c];
        for (let i = item.a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [item.a[i], item.a[j]] = [item.a[j], item.a[i]];
        }
        item.c = item.a.indexOf(correctAnswerText);
    });
}

function loadQuestion() {
    nextBtnElem.style.display = 'none';
    const currentQuestion = quizData[currentQuestionIndex];
    
    progressTextElem.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
    questionTextElem.innerText = currentQuestion.q;
    optionsContainerElem.innerHTML = '';

    currentQuestion.a.forEach((option, index) => {
        const li = document.createElement('li');
        li.className = 'option-item';
        li.innerText = option;
        setupPressEvents(li, index);
        optionsContainerElem.appendChild(li);
    });
}

function setupPressEvents(element, index) {
    let pressTimer;
    let isLongPress = false;

    const startPress = (e) => {
        isLongPress = false;
        pressTimer = setTimeout(() => {
            isLongPress = true;
            element.classList.toggle('eliminated');
        }, 500); // 500ms criteria for strikeout line toggle
    };

    const endPress = (e) => {
        clearTimeout(pressTimer);
        if (!isLongPress && !element.classList.contains('eliminated')) {
            checkAnswer(index, element);
        }
    };

    const cancelPress = () => {
        clearTimeout(pressTimer);
    };

    element.addEventListener('touchstart', startPress, { passive: true });
    element.addEventListener('touchend', endPress);
    element.addEventListener('touchmove', cancelPress);

    element.addEventListener('mousedown', startPress);
    element.addEventListener('mouseup', endPress);
    element.addEventListener('mouseleave', cancelPress);
}

function checkAnswer(selectedIndex, selectedElement) {
    const currentQuestion = quizData[currentQuestionIndex];
    const options = optionsContainerElem.children;

    totalAnswered++;

    if (selectedIndex === currentQuestion.c) {
        selectedElement.classList.add('correct');
        score++;
    } else {
        selectedElement.classList.add('incorrect');
        options[currentQuestion.c].classList.add('correct');
    }

    for (let i = 0; i < options.length; i++) {
        options[i].classList.add('disabled');
    }

    scoreTextElem.innerText = `Score: ${score}/${totalAnswered}`;
    nextBtnElem.style.display = 'block';
    
    setTimeout(() => {
        nextBtnElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
        loadQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        showResults();
    }
}

function showResults() {
    quizUiElem.style.display = 'none';
    resultsUiElem.style.display = 'block';
    finalScoreTextElem.innerText = `${score} / ${quizData.length}`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    totalAnswered = 0;
    scoreTextElem.innerText = `Score: 0/0`;
    quizUiElem.style.display = 'block';
    resultsUiElem.style.display = 'none';
    shuffleQuizData();
    loadQuestion();
}

shuffleQuizData();
loadQuestion();
</script>

</body>
</html>
